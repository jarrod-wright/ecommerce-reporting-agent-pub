profile_name: "ERA Edge Case Scenarios Testing Dataset"

global_settings:
  seed: 1337
  date_range:
    start: "2024-01-01"
    end: "2024-12-31"

entities:
  - entity_name: shopify_customers
    count: 1000
    field_schema:
      customer_id:
        provider: uuid
      first_name:
        provider: person.first_name
      last_name:
        provider: person.last_name
      email:
        provider: person.email
      phone:
        provider: person.telephone
      created_at:
        provider: datetime.datetime
        start: 2023
        end: 2024

  - entity_name: shopify_orders
    count_per_parent:
      parent_entity: shopify_customers
      distribution: normal
      mean: 5
      std_dev: 15
      min: 0
      max: 1000
    relationships:
      - type: foreign_key
        from_entity: shopify_customers
        from_field: customer_id
        to_field: customer_id
    field_schema:
      id:
        provider: uuid
      order_number:
        provider: random.randint
        a: 1000
        b: 999999
      created_at:
        provider: datetime.datetime
        start: 2024
        end: 2024
      total_price:
        provider: choice
        items: [0.01, 999999.99, 25.00, 50.00, 100.00, 150.00]
        weights: [0.05, 0.05, 0.3, 0.3, 0.2, 0.1]
      financial_status:
        provider: choice
        items: [paid, pending, refunded]
      fulfillment_status:
        provider: choice
        items: [fulfilled, unfulfilled, shipped]
      customer_id:
        provider: placeholder

  - entity_name: ga4_sessions
    count: 15000
    field_schema:
      date:
        provider: datetime.date
        start: 2024
        end: 2024
      device_category:
        provider: choice
        items: [desktop, mobile, tablet]
        weights: [0.6, 0.35, 0.05]
      page_views:
        provider: choice
        items: [null, 1, 1000]
        weights: [0.25, 0.70, 0.05]
      duration:
        provider: random.randint
        a: 30
        b: 1800
      sessions:
        provider: choice
        items: [1]
      users:
        provider: choice
        items: [1]
